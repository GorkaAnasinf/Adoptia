<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>

                    "on-surface": "#1d1b17",
                    "secondary-container": "#bcece6",
                    "surface-bright": "#fef8f0",
                    "primary-fixed": "#ffdad3",
                    "primary": "#9f402d",
                    "on-primary": "#ffffff",
                    "on-tertiary-fixed-variant": "#374b43",
                    "tertiary-fixed": "#d1e8dd",
                    "error-container": "#ffdad6",
                    "background": "#fef8f0",
                    "on-tertiary": "#ffffff",
                    "on-surface-variant": "#56423e",
                    "on-primary-container": "#5a0d02",
                    "inverse-on-surface": "#f6f0e8",
                    "inverse-surface": "#32302b",
                    "on-secondary": "#ffffff",

                    "on-background": "#1d1b17",
                    "tertiary-fixed-dim": "#b5ccc1",
                    "on-error": "#ffffff",
                    "on-secondary-fixed": "#00201e",
                    "error": "#ba1a1a",
                    "secondary-fixed": "#bcece6",
                    "outline-variant": "#ddc0ba",
                    "on-secondary-fixed-variant": "#204e4a",
                    "surface-tint": "#9f402d",
                    "on-tertiary-container": "#1b2f28",
                    "tertiary": "#4e635a",
                    "surface-container": "#f3ede5",
                    "on-secondary-container": "#3f6c68",

            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",

            "spacing": {

                    "headline-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        
        .ambient-shadow {
            box-shadow: 0 12px 24px -4px rgba(226, 114, 91, 0.08);
        }

        .role-card-active {
            border: 2px solid #9f402d;
            background-color: #ffdad3;
        }

        .role-card-inactive {
            border: 2px solid transparent;
            background-color: #f9f3eb;
        }

        input:focus {
            outline: none;
            border-color: #4e635a !important; /* Sage Green */
            box-shadow: 0 0 0 2px rgba(78, 99, 90, 0.1);
        }

        .strength-bar {
            height: 4px;
            border-radius: 2px;
            transition: width 0.3s ease, background-color 0.3s ease;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md flex flex-col">
<!-- TopNavBar -->
<header class="w-full top-0 bg-background dark:bg-background z-50">
<nav class="flex justify-between items-center px-margin-mobile md:px-lg py-md max-w-container-max mx-auto">
<div class="flex items-center gap-xs">
<span class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim">Adoptia</span>
</div>
<div class="flex items-center gap-lg">
<a class="font-body-md text-body-md text-on-surface-variant dark:text-on-surface-variant hover:text-primary-container transition-colors transition-all duration-200 ease-in-out" href="#">Volver</a>
<a class="font-body-md text-body-md text-on-surface-variant dark:text-on-surface-variant hover:text-primary-container transition-colors transition-all duration-200 ease-in-out" href="#">Ayuda</a>
</div>
</nav>
</header>
<main class="flex-grow flex items-center justify-center px-margin-mobile py-xxl">
<div class="max-w-[540px] w-full space-y-xl">
<!-- Headline Section -->
<div class="text-center space-y-sm">
<h1 class="font-headline-xl text-headline-xl md:text-headline-xl text-on-surface">Crea tu cuenta en Adoptia</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Elige cómo quieres unirte a nuestra comunidad</p>
</div>
<!-- Role Selection Cards -->
<div class="grid grid-cols-2 gap-md">
<button class="role-card-active flex flex-col items-center justify-center p-lg rounded-xl transition-all duration-300 ambient-shadow group" id="btn-adoptante" onclick="selectRole('adoptante')">
<div class="w-16 h-16 rounded-full bg-primary-container/10 flex items-center justify-center mb-sm group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[32px] text-primary" data-icon="paws">labs</span>
</div>
<span class="font-label-md text-label-md text-on-surface">Quiero adoptar</span>
</button>
<button class="role-card-inactive flex flex-col items-center justify-center p-lg rounded-xl transition-all duration-300 ambient-shadow group opacity-80 hover:opacity-100" id="btn-protectora" onclick="selectRole('protectora')">
<div class="w-16 h-16 rounded-full bg-secondary-container/10 flex items-center justify-center mb-sm group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[32px] text-secondary" data-icon="home_health">home_health</span>
</div>
<span class="font-label-md text-label-md text-on-surface">Soy una protectora</span>
</button>
</div>
<!-- Registration Form -->
<div class="bg-surface-container-low p-xl md:p-xxl rounded-[32px] ambient-shadow">
<form class="space-y-lg" id="registration-form">
<!-- Name Field -->
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant ml-xs" for="name">Nombre completo</label>
<input class="w-full h-[48px] px-md rounded-lg border-2 border-surface-container-highest bg-surface-bright font-body-md text-on-surface transition-all placeholder:text-on-surface-variant/40" id="name" name="name" placeholder="Ej. Ana García" required="" type="text"/>
</div>
<!-- Email Field -->
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant ml-xs" for="email">Correo electrónico</label>
<input class="w-full h-[48px] px-md rounded-lg border-2 border-surface-container-highest bg-surface-bright font-body-md text-on-surface transition-all placeholder:text-on-surface-variant/40" id="email" name="email" placeholder="tu@email.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant ml-xs" for="password">Contraseña</label>
<div class="relative">
<input class="w-full h-[48px] px-md rounded-lg border-2 border-surface-container-highest bg-surface-bright font-body-md text-on-surface transition-all placeholder:text-on-surface-variant/40" id="password" name="password" oninput="checkStrength(this.value)" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant/60 hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Strength Indicator -->
<div class="flex gap-xs px-xs pt-xs">
<div class="strength-bar flex-grow bg-surface-container-highest" id="bar-1"></div>
<div class="strength-bar flex-grow bg-surface-container-highest" id="bar-2"></div>
<div class="strength-bar flex-grow bg-surface-container-highest" id="bar-3"></div>
</div>
<p class="text-label-sm font-label-sm text-on-surface-variant/60 mt-xs ml-xs" id="strength-text">Usa al menos 8 caracteres</p>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-md pt-sm">
<div class="flex items-center h-5">
<input class="w-5 h-5 rounded border-2 border-outline text-primary-container focus:ring-primary transition-colors cursor-pointer" id="terms" required="" type="checkbox"/>
</div>
<label class="font-label-md text-label-md text-on-surface-variant leading-tight" for="terms">
                            Acepto los <a class="text-primary font-bold hover:underline" href="#">Términos de servicio</a> y la <a class="text-primary font-bold hover:underline" href="#">Política de privacidad</a>.
                        </label>
</div>
<!-- Submit Button -->
<button class="w-full h-[48px] bg-primary-container hover:bg-primary text-on-primary font-label-md text-label-md rounded-xl transition-all duration-300 ambient-shadow flex items-center justify-center gap-sm" type="submit">
                        Crear cuenta
                    </button>
</form>
<!-- Footer Link -->
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                        ¿Ya tienes cuenta? <a class="text-primary font-bold hover:underline" href="#">Inicia sesión</a>
</p>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full bottom-0 bg-surface-container-low dark:bg-surface-dim">
<div class="flex flex-col md:flex-row justify-between items-center px-margin-mobile md:px-lg py-xl max-w-container-max mx-auto gap-md">
<span class="font-headline-sm text-headline-sm text-primary">Adoptia</span>
<div class="flex gap-lg">
<a class="font-label-sm text-label-sm text-on-surface-variant dark:text-on-surface-variant hover:text-secondary-container transition-colors transition-opacity duration-150" href="#">Privacidad</a>
<a class="font-label-sm text-label-sm text-on-surface-variant dark:text-on-surface-variant hover:text-secondary-container transition-colors transition-opacity duration-150" href="#">Términos</a>
<a class="font-label-sm text-label-sm text-on-surface-variant dark:text-on-surface-variant hover:text-secondary-container transition-colors transition-opacity duration-150" href="#">Contacto</a>
</div>
<p class="font-label-sm text-label-sm text-secondary dark:text-secondary-fixed-dim text-center md:text-right">© 2024 Adoptia. Nurturing Connection.</p>
</div>
</footer>
<script>
        function selectRole(role) {
            const adoptanteBtn = document.getElementById('btn-adoptante');
            const protectoraBtn = document.getElementById('btn-protectora');
            
            if (role === 'adoptante') {
                adoptanteBtn.className = 'role-card-active flex flex-col items-center justify-center p-lg rounded-xl transition-all duration-300 ambient-shadow group';
                protectoraBtn.className = 'role-card-inactive flex flex-col items-center justify-center p-lg rounded-xl transition-all duration-300 ambient-shadow group opacity-80 hover:opacity-100';
            } else {
                protectoraBtn.className = 'role-card-active flex flex-col items-center justify-center p-lg rounded-xl transition-all duration-300 ambient-shadow group';
                adoptanteBtn.className = 'role-card-inactive flex flex-col items-center justify-center p-lg rounded-xl transition-all duration-300 ambient-shadow group opacity-80 hover:opacity-100';
            }
        }

        function checkStrength(val) {
            const bar1 = document.getElementById('bar-1');
            const bar2 = document.getElementById('bar-2');
            const bar3 = document.getElementById('bar-3');
            const text = document.getElementById('strength-text');

            if (val.length === 0) {
                [bar1, bar2, bar3].forEach(b => b.className = 'strength-bar flex-grow bg-surface-container-highest');
                text.innerText = 'Usa al menos 8 caracteres';
                text.className = 'text-label-sm font-label-sm text-on-surface-variant/60 mt-xs ml-xs';
            } else if (val.length < 5) {
                bar1.className = 'strength-bar flex-grow bg-error';
                [bar2, bar3].forEach(b => b.className = 'strength-bar flex-grow bg-surface-container-highest');
                text.innerText = 'Contraseña débil';
                text.className = 'text-label-sm font-label-sm text-error mt-xs ml-xs';
            } else if (val.length < 10) {
                [bar1, bar2].forEach(b => b.className = 'strength-bar flex-grow bg-tertiary-container');
                bar3.className = 'strength-bar flex-grow bg-surface-container-highest';
                text.innerText = 'Contraseña aceptable';
                text.className = 'text-label-sm font-label-sm text-tertiary mt-xs ml-xs';
            } else {
                [bar1, bar2, bar3].forEach(b => b.className = 'strength-bar flex-grow bg-secondary');
                text.innerText = 'Contraseña muy segura';
                text.className = 'text-label-sm font-label-sm text-secondary mt-xs ml-xs';
            }
        }

        // Form Submission visual feedback
        document.getElementById('registration-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Procesando...';
            
            setTimeout(() => {
                alert('¡Registro iniciado! Bienvenido a la comunidad de Adoptia.');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 1500);
        });
    </script>
</body></html>
