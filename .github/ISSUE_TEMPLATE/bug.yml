name: 🐛 Bug
description: Algo no funciona como debería
title: "[BUG] "
labels: [bug]
body:
  - type: textarea
    id: descripcion
    attributes:
      label: Qué pasa
      description: Describe el problema observado
    validations:
      required: true
  - type: textarea
    id: pasos
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Ir a...
        2. Pulsar...
        3. Error
    validations:
      required: true
  - type: textarea
    id: esperado
    attributes:
      label: Comportamiento esperado
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Área
      options:
        - Área pública / adoptante
        - Panel protectora
        - Admin
        - Mapa / geolocalización
        - Emails
        - Otro
    validations:
      required: true
  - type: dropdown
    id: dispositivo
    attributes:
      label: Dispositivo
      options: [Móvil, Escritorio, Ambos]
    validations:
      required: true
