name: Keepalive Supabase
# Registro forzado del workflow (GitHub no lo indexó en el primer push)

# Supabase Free pausa el proyecto tras 7 días sin actividad.
# Este ping semanal lo evita. Requiere secrets del proyecto.

on:
  schedule:
    - cron: "0 8 * * 1,4" # lunes y jueves 08:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping a Supabase
        run: |
          curl -sf "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/?apikey=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" > /dev/null
          echo "Supabase activo."
