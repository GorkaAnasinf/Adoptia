name: CI

# Registro forzado del workflow (GitHub no lo indexó en el primer push)
on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

jobs:
  app:
    name: Lint + Typecheck + Test + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detectar app Next.js
        id: app
        run: |
          if [ -f package.json ]; then echo "exists=true" >> "$GITHUB_OUTPUT"; else echo "exists=false" >> "$GITHUB_OUTPUT"; fi

      # La versión sale de .nvmrc, que es la misma que usa Vercel (24.x):
      # antes CI iba en Node 20, dos majors por detrás de producción
      # (IMPROVEMENT-023). Una sola fuente de verdad para local, CI y Vercel.
      - uses: actions/setup-node@v4
        if: steps.app.outputs.exists == 'true'
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Instalar dependencias
        if: steps.app.outputs.exists == 'true'
        run: npm ci

      - name: Lint
        if: steps.app.outputs.exists == 'true'
        run: npm run lint

      - name: Typecheck
        if: steps.app.outputs.exists == 'true'
        run: npx tsc --noEmit

      # Solo el proyecto `unit`: los tests de RLS necesitan el stack de Supabase
      # y corren en el job `rls`, en paralelo (BUG-007).
      - name: Tests con cobertura (mínimo 70%)
        if: steps.app.outputs.exists == 'true'
        run: npm run test -- --coverage --project=unit

      - name: Build
        if: steps.app.outputs.exists == 'true'
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Auditoría de dependencias
        if: steps.app.outputs.exists == 'true'
        run: npm audit --audit-level=high

  # BUG-007: hasta 2026-07-15 los 122 tests de RLS se saltaban en verde en cada
  # push (sin stack no hay variables, y `describe.skipIf` no hace ruido). "RLS
  # es el pilar de seguridad" del proyecto, así que aquí se ejecutan de verdad
  # contra un Postgres real. Job aparte para no alargar el camino rápido.
  rls:
    name: Tests de RLS (Supabase local)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      # El CLI de Supabase es devDependency (Decisión #17) y el runner ya trae
      # Docker: no hace falta ninguna action extra.
      - name: Levantar el stack local
        run: npx supabase start

      # Las claves del stack local son las de demo del CLI, iguales en cualquier
      # máquina: NO son secretos y por eso se leen del propio `status`.
      - name: Exportar variables del stack
        run: |
          eval "$(npx supabase status -o env)"
          {
            echo "SUPABASE_TEST_URL=$API_URL"
            echo "SUPABASE_TEST_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_TEST_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"

      # Si las variables faltasen, `src/test/rls/helpers.ts` aborta con CI=true
      # en vez de saltarse los tests: un skip silencioso aquí es un agujero.
      - name: Tests de RLS
        run: npx vitest run --project=rls

      - name: Parar el stack
        if: always()
        run: npx supabase stop --no-backup

  # IMPROVEMENT-022: los E2E caían en la misma trampa que los RLS (BUG-007) —
  # se saltaban solos sin stack, invisibles. Job propio: Playwright arranca su
  # `next dev`, así que no cabe en el de RLS sin alargarlo de más.
  #
  # Activo en cada push desde BUG-008, que dejó la suite en verde (27/27; los 2
  # saltos que quedan son `test.skip` declarados, no saltos por entorno).
  e2e:
    name: E2E (Playwright + Supabase local)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar navegador
        run: npx playwright install --with-deps chromium

      - name: Levantar el stack local
        run: npx supabase start

      # El `next dev` que arranca Playwright necesita apuntar al stack local,
      # no a producción: en local eso sale de .env.local, que aquí no existe.
      # SMTP se deja fuera a propósito — el envío de email debe ser
      # best-effort y los flujos no pueden depender de que salga el correo.
      - name: Exportar variables del stack
        run: |
          eval "$(npx supabase status -o env)"
          {
            echo "SUPABASE_TEST_URL=$API_URL"
            echo "SUPABASE_TEST_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "NEXT_PUBLIC_SITE_URL=http://localhost:3000"
          } >> "$GITHUB_ENV"
        # Nota: NO se define NEXT_PUBLIC_TURNSTILE_SITE_KEY a propósito — sin
        # ella el captcha no se renderiza. `playwright.config.ts` la vacía
        # también en local (ver el comentario de `webServer.env`).

      # Si faltasen las variables, `e2e/entorno.ts` aborta con CI=true en vez
      # de saltarse los tests en verde.
      - name: E2E
        run: npx playwright test

      - name: Guardar el informe si algo falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Parar el stack
        if: always()
        run: npx supabase stop --no-backup

  planning:
    name: Render de planificación coherente
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verificar que las vistas están al día con los items
        run: |
          python scripts/render_planning.py
          git diff --exit-code docs/ || {
            echo "::error::BACKLOG/ROADMAP/PRODUCT_CONTEXT desactualizados. Ejecuta 'python scripts/render_planning.py' y commitea."; exit 1; }

  docs:
    name: Sitio de documentación
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-docs.txt
      - run: mkdocs build
